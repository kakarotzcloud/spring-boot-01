apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-app
spec:
  replicas: 2
  selector:
    matchLabels:
    app: springboot
  template:
  metadata:
    labels:
    app: springboot
  spec:
    containers:
      - name: springboot
        image:
        ports:
          - containerPort:
        env:
          - name: SPRING_DATA_MONGODB_URI
            value: mongodb://mongo:27017/testdb
